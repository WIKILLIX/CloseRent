<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Prenda para Lavandería - CloseRent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">CloseRent</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Registrar Prenda para Lavandería</h2>

        <form th:action="@{/lavanderia/registrar}" method="post">
            <div class="mb-3">
                <label for="referenciaPrenda" class="form-label">Prenda</label>
                <select class="form-control" id="referenciaPrenda" name="referenciaPrenda" required>
                    <option value="">Seleccione una prenda...</option>
                    <option th:each="prenda : ${prendas}"
                            th:value="${prenda.referencia}"
                            th:text="${prenda.referencia + ' - ' + prenda.getInfo()}">
                    </option>
                </select>
            </div>

            <div class="mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="esPrioridad"
                           name="esPrioridad" onchange="mostrarMotivo()">
                    <label class="form-check-label" for="esPrioridad">
                        ¿Tiene Prioridad?
                    </label>
                </div>
                <small class="form-text text-muted">
                    Marcar si la prenda está manchada, es delicada o requiere atención especial
                </small>
            </div>

            <div id="divMotivo" style="display:none;" class="mb-3">
                <label for="motivo" class="form-label">Motivo de Prioridad</label>
                <select class="form-control" id="motivo" name="motivo">
                    <option value="Prenda manchada">Prenda manchada</option>
                    <option value="Prenda delicada">Prenda delicada</option>
                    <option value="Decisión administrativa">Decisión administrativa</option>
                    <option value="Urgente">Urgente</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Registrar</button>
            <a href="/lavanderia" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>

    <script>
        function mostrarMotivo() {
            var checkbox = document.getElementById('esPrioridad');
            var divMotivo = document.getElementById('divMotivo');
            divMotivo.style.display = checkbox.checked ? 'block' : 'none';
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
