<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado Lavandería - CloseRent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">CloseRent</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Listado de Prendas para Lavandería</h2>

        <div th:if="${mensaje}" th:class="'alert alert-' + ${tipoMensaje == 'success' ? 'success' : 'danger'}">
            <span th:text="${mensaje}"></span>
        </div>

        <div class="alert alert-info">
            <strong>Total de prendas en cola:</strong> <span th:text="${total}"></span>
        </div>

        <form th:action="@{/lavanderia/enviar}" method="post" class="mb-3">
            <div class="row">
                <div class="col-md-3">
                    <input type="number" class="form-control" name="cantidad"
                           placeholder="Cantidad a enviar" min="1" th:max="${total}" required>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-success">Enviar a Lavandería</button>
                </div>
            </div>
        </form>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Referencia</th>
                    <th>Información de la Prenda</th>
                    <th>Prioridad</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="prendaDec : ${prendas}">
                    <td th:text="${prendaDec.prenda.referencia}"></td>
                    <td th:text="${prendaDec.info}"></td>
                    <td>
                        <span th:if="${prendaDec.tienePrioridad()}" class="badge bg-danger">PRIORIDAD</span>
                        <span th:unless="${prendaDec.tienePrioridad()}" class="badge bg-secondary">Normal</span>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${prendasEnviadas != null and #lists.size(prendasEnviadas) > 0}" class="mt-4">
            <h4>Prendas Enviadas a Lavandería</h4>
            <div class="alert alert-success">
                <ul>
                    <li th:each="prenda : ${prendasEnviadas}" th:text="${prenda.info}"></li>
                </ul>
            </div>
        </div>

        <a href="/lavanderia" class="btn btn-secondary">Volver</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
