<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lavandería - CloseRent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">CloseRent</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Gestión de Lavandería</h2>

        <div th:if="${mensaje}" th:class="'alert alert-' + ${tipoMensaje == 'success' ? 'success' : 'danger'}">
            <span th:text="${mensaje}"></span>
        </div>

        <div class="row mt-4">
            <div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Registrar Prenda</h5>
                        <p class="card-text">Agregar prenda a la cola de lavandería</p>
                        <a href="/lavanderia/registrar" class="btn btn-primary">Registrar</a>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Ver Listado</h5>
                        <p class="card-text">Visualizar prendas en cola para lavandería</p>
                        <a href="/lavanderia/listado" class="btn btn-info">Ver Listado</a>
                    </div>
                </div>
            </div>
        </div>

        <a href="/" class="btn btn-secondary mt-3">Volver al Inicio</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
