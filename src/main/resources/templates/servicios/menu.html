<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Servicios de Alquiler - CloseRent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">CloseRent</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Servicios de Alquiler</h2>

        <div th:if="${mensaje}" th:class="'alert alert-' + ${tipoMensaje == 'success' ? 'success' : 'danger'}">
            <span th:text="${mensaje}"></span>
        </div>

        <div class="row mt-4">
            <div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Nuevo Servicio</h5>
                        <p class="card-text">Registrar un nuevo servicio de alquiler</p>
                        <a href="/servicios/nuevo" class="btn btn-primary">Ir</a>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Consultar Servicio</h5>
                        <form action="/servicios/consultar" method="get">
                            <div class="input-group">
                                <input type="number" class="form-control" name="numeroServicio"
                                       placeholder="Número de servicio" required>
                                <button class="btn btn-primary" type="submit">Buscar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Servicios por Cliente</h5>
                        <form action="/servicios/consultar-por-cliente" method="get">
                            <div class="input-group">
                                <input type="text" class="form-control" name="clienteId"
                                       placeholder="ID del cliente" required>
                                <button class="btn btn-primary" type="submit">Buscar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Servicios por Fecha</h5>
                        <form action="/servicios/consultar-por-fecha" method="get">
                            <div class="input-group">
                                <input type="date" class="form-control" name="fecha" required>
                                <button class="btn btn-primary" type="submit">Buscar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <a href="/" class="btn btn-secondary mt-3">Volver al Inicio</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
