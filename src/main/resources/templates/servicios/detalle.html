<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle Servicio - CloseRent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">CloseRent</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Detalle del Servicio de Alquiler</h2>

        <div class="card mb-3">
            <div class="card-body">
                <h5>Información del Servicio</h5>
                <p><strong>Número de Servicio:</strong> <span th:text="${servicio.numeroServicio}"></span></p>
                <p><strong>Fecha de Solicitud:</strong> <span th:text="${servicio.fechaSolicitud}"></span></p>
                <p><strong>Fecha de Alquiler:</strong> <span th:text="${servicio.fechaAlquiler}"></span></p>
                <p><strong>Cliente:</strong> <span th:text="${servicio.cliente.nombre + ' (' + servicio.cliente.numeroIdentificacion + ')'}"></span></p>
                <p><strong>Empleado:</strong> <span th:text="${servicio.empleado.nombre + ' - ' + servicio.empleado.cargo}"></span></p>
                <p><strong>Valor Total:</strong> <span th:text="${'$' + servicio.calcularValorTotal()}"></span></p>
            </div>
        </div>

        <h4>Prendas del Servicio</h4>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Referencia</th>
                    <th>Tipo</th>
                    <th>Información</th>
                    <th>Valor</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="prenda : ${servicio.prendas}">
                    <td th:text="${prenda.referencia}"></td>
                    <td th:text="${prenda.tipoPrenda}"></td>
                    <td th:text="${prenda.getInfo()}"></td>
                    <td th:text="${'$' + prenda.valorAlquiler}"></td>
                </tr>
            </tbody>
        </table>

        <a href="/servicios" class="btn btn-secondary">Volver</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
