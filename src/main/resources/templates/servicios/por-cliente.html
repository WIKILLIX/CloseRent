<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Servicios por Cliente - CloseRent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">CloseRent</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Servicios Vigentes del Cliente</h2>

        <div class="card mb-3">
            <div class="card-body">
                <p><strong>Cliente:</strong> <span th:text="${cliente.nombre}"></span></p>
                <p><strong>ID:</strong> <span th:text="${cliente.numeroIdentificacion}"></span></p>
            </div>
        </div>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Número Servicio</th>
                    <th>Fecha Solicitud</th>
                    <th>Fecha Alquiler</th>
                    <th>Empleado</th>
                    <th>Prendas</th>
                    <th>Valor Total</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="servicio : ${servicios}">
                    <td th:text="${servicio.numeroServicio}"></td>
                    <td th:text="${servicio.fechaSolicitud}"></td>
                    <td th:text="${servicio.fechaAlquiler}"></td>
                    <td th:text="${servicio.empleado.nombre}"></td>
                    <td th:text="${#lists.size(servicio.prendas)}"></td>
                    <td th:text="${'$' + servicio.calcularValorTotal()}"></td>
                    <td>
                        <a th:href="@{/servicios/consultar(numeroServicio=${servicio.numeroServicio})}"
                           class="btn btn-sm btn-info">Ver Detalle</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <a href="/servicios" class="btn btn-secondary">Volver</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
