<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle Cliente - CloseRent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">CloseRent</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Información del Cliente</h2>

        <div class="card mb-3">
            <div class="card-body">
                <p><strong>Número ID:</strong> <span th:text="${cliente.numeroIdentificacion}"></span></p>
                <p><strong>Nombre:</strong> <span th:text="${cliente.nombre}"></span></p>
                <p><strong>Dirección:</strong> <span th:text="${cliente.direccion}"></span></p>
                <p><strong>Teléfono:</strong> <span th:text="${cliente.telefono}"></span></p>
                <p><strong>Correo:</strong> <span th:text="${cliente.correoElectronico}"></span></p>
            </div>
        </div>

        <h3>Servicios Vigentes</h3>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Número</th>
                    <th>Fecha Solicitud</th>
                    <th>Fecha Alquiler</th>
                    <th>Empleado</th>
                    <th>Prendas</th>
                    <th>Valor Total</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="servicio : ${servicios}">
                    <td th:text="${servicio.numeroServicio}"></td>
                    <td th:text="${servicio.fechaSolicitud}"></td>
                    <td th:text="${servicio.fechaAlquiler}"></td>
                    <td th:text="${servicio.empleado.nombre}"></td>
                    <td th:text="${#lists.size(servicio.prendas)}"></td>
                    <td th:text="${'$' + servicio.calcularValorTotal()}"></td>
                </tr>
            </tbody>
        </table>

        <a href="/clientes" class="btn btn-secondary">Volver</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
