<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clientes - CloseRent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">CloseRent</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Gestión de Clientes</h2>

        <div th:if="${mensaje}" th:class="'alert alert-' + ${tipoMensaje == 'success' ? 'success' : 'danger'}">
            <span th:text="${mensaje}"></span>
        </div>

        <div class="mb-3">
            <a href="/clientes/nuevo" class="btn btn-primary">Nuevo Cliente</a>
            <a href="/" class="btn btn-secondary">Volver al Inicio</a>
        </div>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Número ID</th>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Correo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="cliente : ${clientes}">
                    <td th:text="${cliente.numeroIdentificacion}"></td>
                    <td th:text="${cliente.nombre}"></td>
                    <td th:text="${cliente.telefono}"></td>
                    <td th:text="${cliente.correoElectronico}"></td>
                    <td>
                        <a th:href="@{/clientes/consultar(numeroId=${cliente.numeroIdentificacion})}"
                           class="btn btn-sm btn-info">Ver Servicios</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
