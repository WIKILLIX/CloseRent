spring.application.name=ClosetRent

# H2 Database Configuration (Development - commented out)
#spring.datasource.url=jdbc:h2:mem:atuendosdb
#spring.datasource.driverClassName=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=

# MariaDB Configuration (Production - ACTIVE)
spring.datasource.url=jdbc:mariadb://127.0.0.1:3306/close_rent_bd
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# H2 Console (Development only - disabled)
spring.h2.console.enabled=false
#spring.h2.console.path=/h2-console

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server Configuration
server.port=8080
